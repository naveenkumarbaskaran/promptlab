name: Release — PyPI + Homebrew

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1

  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: pypi
    steps:
      - name: Wait for PyPI propagation
        run: sleep 30

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Get SHA256 from PyPI
        id: sha
        run: |
          URL=$(curl -sL "https://pypi.org/pypi/promptlab-ai/${{ steps.version.outputs.version }}/json" \
            | jq -r '.urls[] | select(.packagetype=="sdist") | .url')
          SHA=$(curl -sL "https://pypi.org/pypi/promptlab-ai/${{ steps.version.outputs.version }}/json" \
            | jq -r '.urls[] | select(.packagetype=="sdist") | .digests.sha256')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: naveenkumarbaskaran/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "formula": "promptlab",
              "version": "${{ steps.version.outputs.version }}",
              "url": "${{ steps.sha.outputs.url }}",
              "sha256": "${{ steps.sha.outputs.sha256 }}"
            }
